apiVersion: apps/v1
kind: Deployment
metadata:
  name: wetlands-v2
  labels:
    app: wetlands-v2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: wetlands-v2
  template:
    metadata:
      labels:
        app: wetlands-v2
    spec:
      initContainers:
      - name: git-clone
        image: alpine/git:2.52.0
        command:
        - sh
        - -c
        - |
          git clone --depth 1 https://github.com/boettiger-lab/wetlands-v2.git /tmp/repo
          cp /tmp/repo/index.html /usr/share/nginx/html/
          cp /tmp/repo/layers-input.json /usr/share/nginx/html/
          cp /tmp/repo/system-prompt.md /usr/share/nginx/html/
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        env:
        - name: TMPDIR
          value: "/tmp"
        - name: MCP_SERVER_URL
          value: "https://duckdb-mcp.nrp-nautilus.io/mcp"
        - name: PROXY_KEY
          valueFrom:
            secretKeyRef:
              name: open-llm-proxy-secrets
              key: proxy-key
              optional: true
        command:
        - sh
        - -c
        - |
          apk add --no-cache gettext
          # Client-side config: no secrets.
          envsubst '$${MCP_SERVER_URL}' < /config/config.template.json \
            > /usr/share/nginx/html/config.json
          # Server-side nginx config: substitutes ${PROXY_KEY} into the
          # /api/llm/ reverse proxy's Authorization header. Limited to
          # ${PROXY_KEY} so nginx's own $uri / $remote_addr variables
          # are preserved.
          envsubst '$${PROXY_KEY}' < /nginx-template/nginx.conf.template \
            > /etc/nginx/conf.d/default.conf
          nginx -g 'daemon off;'
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
        - name: nginx-template
          mountPath: /nginx-template
          readOnly: true
        - name: nginx-conf-d
          mountPath: /etc/nginx/conf.d
        - name: config-template
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: website-content
        emptyDir: {}
      - name: config-template
        configMap:
          name: wetlands-v2-config
      - name: nginx-template
        configMap:
          name: wetlands-v2-nginx
      - name: nginx-conf-d
        emptyDir: {}
